<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Speed lines radiating from center -->
    <pattern id="halftone" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1.5" fill="#1a1a2e" opacity="0.08"/>
    </pattern>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <mask id="panelMask">
      <rect width="900" height="280" fill="white" rx="0"/>
    </mask>
  </defs>

  <!-- Background - off-white manga paper -->
  <rect width="900" height="280" fill="#f5f0e8"/>
  <!-- Halftone overlay -->
  <rect width="900" height="280" fill="url(#halftone)"/>

  <!-- Speed lines from right side - action burst -->
  <g opacity="0.12" stroke="#000" stroke-width="1">
    <line x1="900" y1="140" x2="0" y2="0"/>
    <line x1="900" y1="140" x2="0" y2="28"/>
    <line x1="900" y1="140" x2="0" y2="56"/>
    <line x1="900" y1="140" x2="0" y2="84"/>
    <line x1="900" y1="140" x2="0" y2="112"/>
    <line x1="900" y1="140" x2="0" y2="140"/>
    <line x1="900" y1="140" x2="0" y2="168"/>
    <line x1="900" y1="140" x2="0" y2="196"/>
    <line x1="900" y1="140" x2="0" y2="224"/>
    <line x1="900" y1="140" x2="0" y2="252"/>
    <line x1="900" y1="140" x2="0" y2="280"/>
    <line x1="900" y1="140" x2="180" y2="0"/>
    <line x1="900" y1="140" x2="360" y2="0"/>
    <line x1="900" y1="140" x2="540" y2="0"/>
    <line x1="900" y1="140" x2="720" y2="0"/>
    <line x1="900" y1="140" x2="180" y2="280"/>
    <line x1="900" y1="140" x2="360" y2="280"/>
    <line x1="900" y1="140" x2="540" y2="280"/>
    <line x1="900" y1="140" x2="720" y2="280"/>
  </g>

  <!-- Panel border - thick manga frame -->
  <rect x="6" y="6" width="888" height="268" fill="none" stroke="#000" stroke-width="5" rx="2"/>
  <!-- Inner thin border -->
  <rect x="14" y="14" width="872" height="252" fill="none" stroke="#000" stroke-width="1.5" rx="1"/>

  <!-- Impact diagonal slash - decorative -->
  <rect x="0" y="118" width="900" height="3" fill="#000" opacity="0.06" transform="rotate(-2 450 140)"/>

  <!-- Left panel divider -->
  <line x1="320" y1="6" x2="320" y2="274" stroke="#000" stroke-width="3"/>

  <!-- Left panel - dark dramatic fill -->
  <rect x="6" y="6" width="314" height="268" fill="#0d0d1a" opacity="0.92"/>

  <!-- Diagonal speed burst in left dark panel -->
  <g opacity="0.15" stroke="#fff" stroke-width="0.8">
    <line x1="320" y1="140" x2="6" y2="6"/>
    <line x1="320" y1="140" x2="6" y2="40"/>
    <line x1="320" y1="140" x2="6" y2="80"/>
    <line x1="320" y1="140" x2="6" y2="120"/>
    <line x1="320" y1="140" x2="6" y2="160"/>
    <line x1="320" y1="140" x2="6" y2="200"/>
    <line x1="320" y1="140" x2="6" y2="240"/>
    <line x1="320" y1="140" x2="6" y2="274"/>
    <line x1="320" y1="140" x2="80" y2="6"/>
    <line x1="320" y1="140" x2="160" y2="6"/>
    <line x1="320" y1="140" x2="240" y2="6"/>
    <line x1="320" y1="140" x2="80" y2="274"/>
    <line x1="320" y1="140" x2="160" y2="274"/>
    <line x1="320" y1="140" x2="240" y2="274"/>
  </g>

  <!-- Name in left dark panel - bold manga font style -->
  <text x="163" y="108" font-family="'Arial Black', 'Impact', sans-serif" font-size="38" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="-1">PRINCE</text>
  <text x="163" y="155" font-family="'Arial Black', 'Impact', sans-serif" font-size="38" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="-1">MEHTA</text>

  <!-- aka badge -->
  <rect x="100" y="165" width="126" height="22" fill="#e8e0d0" rx="0"/>
  <rect x="100" y="165" width="126" height="22" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="163" y="180" font-family="'Courier New', monospace" font-size="11" font-weight="700"
        fill="#0d0d1a" text-anchor="middle" letter-spacing="2">aka YunoWiz</text>

  <!-- Right panel content -->
  <!-- Role text - impact style -->
  <text x="348" y="68" font-family="'Arial Black', 'Impact', sans-serif" font-size="15" font-weight="900"
        fill="#0d0d1a" letter-spacing="3">RUST BACKEND ENGINEER</text>
  <text x="348" y="90" font-family="'Arial Black', 'Impact', sans-serif" font-size="15" font-weight="900"
        fill="#0d0d1a" letter-spacing="3">SOLANA PROTOCOL DEVELOPER</text>

  <!-- Divider slash -->
  <rect x="348" y="102" width="520" height="3" fill="#0d0d1a"/>
  <rect x="348" y="107" width="520" height="1" fill="#0d0d1a" opacity="0.3"/>

  <!-- Quote - handwritten style box -->
  <rect x="348" y="118" width="520" height="54" fill="#0d0d1a" rx="0"/>
  <rect x="348" y="118" width="520" height="54" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Quote marks big -->
  <text x="360" y="148" font-family="Georgia, serif" font-size="40" fill="white" opacity="0.15">"</text>
  <text x="374" y="145" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic"
        fill="#f0ead8" letter-spacing="0.5">The ones who move in silence</text>
  <text x="374" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic"
        fill="#f0ead8" letter-spacing="0.5">are the ones who move the chain.</text>

  <!-- Stack chips row -->
  <g transform="translate(348, 188)">
    <!-- Rust chip -->
    <rect x="0" y="0" width="68" height="24" fill="#0d0d1a" rx="0"/>
    <rect x="0" y="0" width="68" height="24" fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="34" y="16" font-family="'Courier New', monospace" font-size="11" font-weight="700"
          fill="white" text-anchor="middle">Rust</text>

    <!-- Solana chip -->
    <rect x="76" y="0" width="80" height="24" fill="#f5f0e8" rx="0"/>
    <rect x="76" y="0" width="80" height="24" fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="116" y="16" font-family="'Courier New', monospace" font-size="11" font-weight="700"
          fill="#0d0d1a" text-anchor="middle">Solana</text>

    <!-- Systems chip -->
    <rect x="164" y="0" width="84" height="24" fill="#f5f0e8" rx="0"/>
    <rect x="164" y="0" width="84" height="24" fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="206" y="16" font-family="'Courier New', monospace" font-size="11" font-weight="700"
          fill="#0d0d1a" text-anchor="middle">Systems</text>

    <!-- Anchor chip -->
    <rect x="256" y="0" width="74" height="24" fill="#f5f0e8" rx="0"/>
    <rect x="256" y="0" width="74" height="24" fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="293" y="16" font-family="'Courier New', monospace" font-size="11" font-weight="700"
          fill="#0d0d1a" text-anchor="middle">Anchor</text>
  </g>

  <!-- Bottom action line -->
  <rect x="348" y="228" width="520" height="2" fill="#0d0d1a"/>

  <!-- Stats row - manga stat boxes -->
  <g transform="translate(348, 238)">
    <text x="0" y="18" font-family="'Courier New', monospace" font-size="10" fill="#444" letter-spacing="1">MUMBAI, INDIA</text>
    <text x="160" y="18" font-family="'Courier New', monospace" font-size="10" fill="#444" letter-spacing="1">OPEN TO WORK</text>
    <text x="340" y="18" font-family="'Courier New', monospace" font-size="10" fill="#444" letter-spacing="1">100+ BUILDERS</text>
  </g>

  <!-- Corner impact marks - manga style -->
  <polygon points="6,6 40,6 6,40" fill="#0d0d1a" opacity="0.8"/>
  <polygon points="894,6 860,6 894,40" fill="#0d0d1a" opacity="0.8"/>
  <polygon points="6,274 40,274 6,240" fill="#0d0d1a" opacity="0.8"/>
  <polygon points="894,274 860,274 894,240" fill="#0d0d1a" opacity="0.8"/>
</svg>
