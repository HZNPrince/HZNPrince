<svg width="900" height="60" viewBox="0 0 900 60" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="60" fill="#0d0d1a"/>

  <pattern id="dots2" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
    <circle cx="5" cy="5" r="1.2" fill="white" opacity="0.04"/>
  </pattern>
  <rect width="900" height="60" fill="url(#dots2)"/>

  <!-- Speed lines white on dark -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.8">
    <line x1="900" y1="30" x2="400" y2="0"/>
    <line x1="900" y1="30" x2="400" y2="15"/>
    <line x1="900" y1="30" x2="400" y2="45"/>
    <line x1="900" y1="30" x2="400" y2="60"/>
  </g>

  <!-- Light left triangle -->
  <polygon points="0,0 80,0 0,60" fill="#f5f0e8" opacity="0.9"/>

  <text x="30" y="38" font-family="'Arial Black', Impact, sans-serif" font-size="22" font-weight="900"
        fill="white" letter-spacing="4">CURRENTLY BUILDING</text>

  <!-- Blinking cursor style dot -->
  <rect x="866" y="22" width="10" height="16" fill="#f5f0e8" rx="0"/>

  <rect x="0" y="0" width="900" height="3" fill="#f5f0e8" opacity="0.3"/>
  <rect x="0" y="57" width="900" height="3" fill="#f5f0e8" opacity="0.3"/>
</svg>
