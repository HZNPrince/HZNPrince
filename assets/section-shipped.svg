<svg width="900" height="60" viewBox="0 0 900 60" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="60" fill="#f5f0e8"/>
  <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
    <circle cx="5" cy="5" r="1.2" fill="#1a1a2e" opacity="0.07"/>
  </pattern>
  <rect width="900" height="60" fill="url(#dots)"/>

  <!-- Diagonal slash element -->
  <polygon points="0,0 900,0 900,60 840,60" fill="#0d0d1a"/>

  <!-- Section label -->
  <text x="20" y="38" font-family="'Arial Black', Impact, sans-serif" font-size="22" font-weight="900"
        fill="#0d0d1a" letter-spacing="4">SHIPPED</text>

  <!-- White text on dark right -->
  <text x="860" y="38" font-family="'Courier New', monospace" font-size="11" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="2">▸ PROJECTS</text>

  <!-- Speed lines left -->
  <g opacity="0.08" stroke="#000" stroke-width="0.8">
    <line x1="0" y1="30" x2="500" y2="0"/>
    <line x1="0" y1="30" x2="500" y2="12"/>
    <line x1="0" y1="30" x2="500" y2="60"/>
    <line x1="0" y1="30" x2="500" y2="48"/>
  </g>

  <rect x="0" y="0" width="900" height="3" fill="#0d0d1a"/>
  <rect x="0" y="57" width="900" height="3" fill="#0d0d1a"/>
</svg>
